version: 1
steps:
- kind: color_adjustments.stack
  description: 'Adjustments: GH012974-cropped - adjusted'
  params:
    source_layer: GH012974-cropped
    output_layer: GH012974-cropped - adjusted
    adjustment_stack:
    - type: surface_blur
      radius: 26
      threshold: 20
      enabled: true
  enabled: true
- kind: color_adjustments.stack
  description: 'Adjustments: GH012974-cropped - adjusted [2]'
  params:
    source_layer: GH012974-cropped
    output_layer: GH012974-cropped - adjusted [2]
    adjustment_stack:
    - type: normalization
      method: unit_l2
      low_percentile: 1
      high_percentile: 99
      z_clip: 3.0
      iqr_multiplier: 1.5
      clip_limit: 2.0
      tile_grid_size: 8
      enabled: true
  enabled: true
- kind: edge_detection.apply
  description: Edge Detection (Canny) on GH012974-cropped - adjusted
  params:
    source_layer: GH012974-cropped - adjusted
    method: canny
    method_label: Canny
    params:
      threshold1: 0
      threshold2: 15
      aperture_size: 3
      blur_ksize: 21
      blur_sigma: 0.0
      l2_gradient: true
    output_layer: GH012974-cropped - adjusted - Edges (Canny)
  enabled: true
