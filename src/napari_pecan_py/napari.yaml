name: napari-pecan-py
contributions:
  commands:
  - id: napari-pecan-py.get_reader
    title: Read video files
    python_name: napari_pecan_py._reader:get_reader
  - id: napari-pecan-py.color_thresholding
    title: Color Thresholding
    python_name: napari_pecan_py.widgets.color_thresholding.widget:ColorThresholdingWidget
  - id: napari-pecan-py.mask_retouching
    title: Mask Retouching
    python_name: napari_pecan_py.widgets.mask_retouching:MaskRetouchingWidget
  - id: napari-pecan-py.contrastive_coding
    title: Contrastive Coding
    python_name: napari_pecan_py.widgets.contrastive_coding:ContrastiveCodingWidget
  - id: napari-pecan-py.yolo_seg
    title: YOLO Segmentation
    python_name: napari_pecan_py.widgets.yolo_seg:YoloSegWidget
  - id: napari-pecan-py.color_adjustments
    title: Adjustments
    python_name: napari_pecan_py.widgets.color_adjustments:ColorAdjustmentsWidget
  - id: napari-pecan-py.pecan_ellipse
    title: Pecan Ellipse
    python_name: napari_pecan_py.widgets.pecan_ellipse:PecanEllipseWidget
  - id: napari-pecan-py.mask_ops
    title: Mask Ops
    python_name: napari_pecan_py.widgets.mask_ops:MaskOpsWidget
  - id: napari-pecan-py.pipeline_recorder
    title: Pipeline Recorder
    python_name: napari_pecan_py.widgets.pipeline_recorder:PipelineRecorderWidget
  - id: napari-pecan-py.edge_detection
    title: Edge Detection
    python_name: napari_pecan_py.widgets.edge_detection:EdgeDetectionWidget
  - id: napari-pecan-py.sam2_seg
    title: SAM 2 Segmentation
    python_name: napari_pecan_py.widgets.sam2_seg:Sam2SegWidget
  readers:
  - command: napari-pecan-py.get_reader
    filename_patterns:
    - "*.mp4"
    - "*.MP4"
    - "*.avi"
    - "*.AVI"
    - "*.mov"
    - "*.MOV"
    - "*.mkv"
    - "*.MKV"
    accepts_directories: false
  widgets:
  - command: napari-pecan-py.color_adjustments
    display_name: Adjustments
    autogenerate: false
  - command: napari-pecan-py.color_thresholding
    display_name: Color Thresholding
    autogenerate: false
  - command: napari-pecan-py.mask_retouching
    display_name: Mask Retouching
    autogenerate: false
  - command: napari-pecan-py.contrastive_coding
    display_name: Contrastive Coding
    autogenerate: false
  - command: napari-pecan-py.yolo_seg
    display_name: YOLO Segmentation
    autogenerate: false
  - command: napari-pecan-py.pecan_ellipse
    display_name: Pecan Ellipse
    autogenerate: false
  - command: napari-pecan-py.mask_ops
    display_name: Mask Ops
    autogenerate: false
  - command: napari-pecan-py.pipeline_recorder
    display_name: Pipeline Recorder
    autogenerate: false
  - command: napari-pecan-py.edge_detection
    display_name: Edge Detection
    autogenerate: false
  - command: napari-pecan-py.sam2_seg
    display_name: SAM 2 Segmentation
    autogenerate: false
